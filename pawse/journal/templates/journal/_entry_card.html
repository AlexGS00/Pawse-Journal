<a href="#" class="block group">
  <article class="bg-stone-100 border border-stone-200 rounded-lg px-6 py-5 hover:border-stone-300 hover:bg-stone-50 transition-colors duration-150">
    <div class="flex items-start justify-between gap-4">
      <h2 class="font-serif italic text-stone-900 text-base leading-snug group-hover:text-stone-700 transition-colors">
        {{ entry.display_title }}
      </h2>
      <time class="text-xs text-stone-400 shrink-0 mt-0.5">
        {{ entry.created_at|date:"M j, Y" }}
      </time>
    </div>
    <p class="mt-2 text-sm text-stone-500 leading-relaxed">{{ entry.excerpt }}</p>
  </article>
</a>
