{% extends "journal/layout.html" %}
{% load static %}

{% block title %}Register — Pawse{% endblock %}

{% block body %}
<div class="max-w-sm mx-auto pt-8">
  <h1 class="font-serif italic text-2xl text-stone-900 mb-8">Create an account.</h1>

  {% if error_message %}
    <p class="text-sm text-red-400 mb-6">{{ error_message }}</p>
  {% endif %}

  <form method="post" class="space-y-5">
    {% csrf_token %}

    <div class="space-y-1">
      <label class="text-xs text-stone-400 uppercase tracking-widest" for="username">Username</label>
      <input
        id="username"
        type="text"
        name="username"
        required
        autofocus
        class="w-full bg-stone-100 border border-stone-200 rounded-md px-4 py-2.5 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
      />
    </div>

    <div class="space-y-1">
      <label class="text-xs text-stone-400 uppercase tracking-widest" for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        required
        class="w-full bg-stone-100 border border-stone-200 rounded-md px-4 py-2.5 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
      />
    </div>

    <div class="space-y-1">
      <label class="text-xs text-stone-400 uppercase tracking-widest" for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        required
        class="w-full bg-stone-100 border border-stone-200 rounded-md px-4 py-2.5 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
      />
    </div>

    <div class="space-y-1">
      <label class="text-xs text-stone-400 uppercase tracking-widest" for="confirmation">Confirm password</label>
      <input
        id="confirmation"
        type="password"
        name="confirmation"
        required
        class="w-full bg-stone-100 border border-stone-200 rounded-md px-4 py-2.5 text-sm text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
      />
    </div>

    <button
      type="submit"
      class="w-full py-2.5 bg-stone-800 text-stone-50 text-sm rounded-md hover:bg-stone-700 transition-colors duration-150">
      Create account
    </button>
  </form>

  <p class="mt-6 text-center text-xs text-stone-400">
    Already have an account?
    <a href="{% url 'login' %}" class="text-stone-600 hover:text-stone-900 transition-colors">Log in</a>
  </p>
</div>
{% endblock %}
