{% extends "journal/layout.html" %}
{% load static %}

{% block title %}{% if entry %}Edit entry{% else %}New entry{% endif %} — Pawse{% endblock %}
{% block nav_journal %}active{% endblock %}

{% block body %}
<div class="mb-8">
  <a href="{% if entry %}{% url 'entry_detail' entry.id %}{% else %}{% url 'index' %}{% endif %}"
     class="text-xs text-stone-400 hover:text-stone-700 transition-colors">← Back</a>
</div>

<form method="post" class="space-y-6">
  {% csrf_token %}

  <input
    type="text"
    name="title"
    value="{% if entry %}{{ entry.title }}{% endif %}"
    placeholder="Title (optional)"
    class="w-full bg-transparent border-none outline-none font-serif italic text-2xl text-stone-900 placeholder-stone-300 focus:ring-0"
  />

  <div class="border-t border-stone-200"></div>

  <textarea
    name="content"
    rows="14"
    placeholder="Write anything…"
    required
    class="w-full bg-transparent border-none outline-none resize-none text-sm text-stone-700 leading-relaxed placeholder-stone-300 focus:ring-0"
  >{% if entry %}{{ entry.content }}{% endif %}</textarea>

  <div class="flex justify-end pt-2 border-t border-stone-200">
    <button
      type="submit"
      class="text-sm px-5 py-2 bg-stone-800 text-stone-50 rounded-md hover:bg-stone-700 transition-colors duration-150">
      {% if entry %}Save changes{% else %}Save entry{% endif %}
    </button>
  </div>
</form>
{% endblock %}
